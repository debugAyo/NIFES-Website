<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - NIFES FUTMinna</title>
  <meta name="description" content="The page you're looking for doesn't exist.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="Style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: white;
    }
    .error-inner {
      max-width: 500px;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 700;
      font-family: var(--font-display);
      line-height: 1;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }
    .error-inner h1 {
      color: white;
      font-size: var(--text-3xl);
      margin-bottom: 0.75rem;
    }
    .error-inner p {
      color: rgba(255,255,255,0.7);
      font-size: var(--text-lg);
      margin-bottom: 2rem;
    }
    .error-inner .btn {
      font-size: var(--text-base);
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-inner">
      <div class="error-code">404</div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
      <div class="hero-buttons" style="justify-content: center;">
        <a href="index.html" class="btn btn-primary">
          <i class="fas fa-home" style="margin-right: 0.4rem;"></i> Back to Home
        </a>
        <a href="events.html" class="btn btn-secondary" style="color: white; border-color: rgba(255,255,255,0.3);">
          View Events
        </a>
      </div>
    </div>
  </div>
</body>
</html>
